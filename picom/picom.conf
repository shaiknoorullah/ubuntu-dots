# ─────────────────────────────────────────────────────────────
# Picom - Compositor Configuration
# ─────────────────────────────────────────────────────────────

# Backend
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
vsync = true;

# ─────────────────────────────────────────────────────────────
# Shadows
# ─────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.5;

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Dunst'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ─────────────────────────────────────────────────────────────
# Opacity / Transparency
# ─────────────────────────────────────────────────────────────
active-opacity = 0.92;
inactive-opacity = 0.85;
frame-opacity = 0.9;

opacity-rule = [
    "100:class_g = 'Rofi'",
    "100:fullscreen:1",
    "80:class_g = 'Kitty' && focused",
    "70:class_g = 'Kitty' && !focused"
];

# ─────────────────────────────────────────────────────────────
# Blur (dual_kawase for rofi fullscreen overlay + general use)
# ─────────────────────────────────────────────────────────────
blur:
{
    method = "dual_kawase";
    strength = 12;
};

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ─────────────────────────────────────────────────────────────
# Fading
# ─────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

# ─────────────────────────────────────────────────────────────
# Corners
# ─────────────────────────────────────────────────────────────
corner-radius = 8;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Rofi'"
];

# ─────────────────────────────────────────────────────────────
# Window type overrides
# ─────────────────────────────────────────────────────────────
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.9; };
    popup_menu = { fade = true; shadow = true; opacity = 0.9; };
    dropdown_menu = { fade = true; shadow = true; opacity = 0.9; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
};
