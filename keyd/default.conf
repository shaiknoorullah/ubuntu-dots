[ids]
*

[main]
# Left hand homerow mods
a = overloadt2(control, a, 200)
s = overloadt2(alt, s, 200)
d = overloadt2(shift, d, 200)
f = overloadt2(meta, f, 200)

# Right hand homerow mods (mirrored)
j = overloadt2(meta, j, 200)
k = overloadt2(shift, k, 200)
l = overloadt2(alt, l, 200)
; = overloadt2(control, semicolon, 200)

# CapsLock toggles number layer
capslock = toggle(numbers)

[numbers]
# Numbers on homerow
a = 1
s = 2
d = overloadt2(shift, 3, 200)
f = 4
g = 5
h = 6
j = 7
k = overloadt2(shift, 8, 200)
l = 9
; = 0
' = -
