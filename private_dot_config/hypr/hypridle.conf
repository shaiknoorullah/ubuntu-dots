# hypridle — idle → lock / screen-off. Autostarted from hyprland.lua.
# https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
# Timeouts are in SECONDS — bump them if a deep-focus reading block locks too soon.

general {
    lock_cmd = pidof hyprlock || hyprlock      # avoid stacking lock instances
    before_sleep_cmd = loginctl lock-session    # lock before the system sleeps
    after_sleep_cmd = hyprctl dispatch dpms on  # wake the screen on resume
}

# Lock after 10 minutes idle.
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Turn the screen off 2 minutes after locking; back on with any input.
listener {
    timeout = 720
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
