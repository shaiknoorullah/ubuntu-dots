# NVIDIA env for Hyprland — RTX 4090, proprietary driver 610 (explicit-sync era).
# Kernel modeset=1 is already set in /etc/modprobe.d/nvidia-graphics-drivers-kms.conf.
# On driver 555+ most legacy env vars are unneeded (and GBM_BACKEND can break
# Electron/Chromium), so we keep this minimal. Add vars only if you hit issues.
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
    no_hardware_cursors = true   # avoids invisible/garbled cursor on nvidia
}
# (explicit sync is automatic on Hyprland 0.55 — no render{} options needed)
