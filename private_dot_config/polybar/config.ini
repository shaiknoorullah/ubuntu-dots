;; ─────────────────────────────────────────────────────────────
;; Polybar Config — Dracula+ (matching tmux)
;; ─────────────────────────────────────────────────────────────

[colors]
bg = #B31a1a2e
fg = #f8f8f2
muted = #585880
purple = #bd93f9
green = #50fa7b
blue = #6a8cff
orange = #ff9e3b
red = #ff4d4d
yellow = #f5d547
transparent = #00000000

;; ─────────────────────────────────────────────────────────────
;; Bar
;; ─────────────────────────────────────────────────────────────

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 32pt

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2pt

padding-left = 1
padding-right = 1

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

modules-left = i3
modules-center = date
modules-right = github notifications

cursor-click = pointer

enable-ipc = true

wm-restack = i3

;; ─────────────────────────────────────────────────────────────
;; Workspaces
;; ─────────────────────────────────────────────────────────────

[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent = true
index-sort = true

label-focused = %{T2}󰝥%{T-}
label-focused-foreground = ${colors.orange}
label-focused-padding = 1

label-unfocused = %{T2}󰝦%{T-}
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 1

label-visible = %{T2}󰝦%{T-}
label-visible-foreground = ${colors.fg}
label-visible-padding = 1

label-urgent = %{T2}󰝥%{T-}
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

;; ─────────────────────────────────────────────────────────────
;; Clock
;; ─────────────────────────────────────────────────────────────

[module/date]
type = internal/date
interval = 60

date =
date-alt = %a %d

time = %H:%M
time-alt = %H:%M

label = %date% %time%
label-foreground = ${colors.fg}

;; ─────────────────────────────────────────────────────────────
;; GitHub
;; ─────────────────────────────────────────────────────────────

[module/github]
type = custom/script
exec = ~/.config/polybar/scripts/github-status.sh
interval = 60
click-left = xdg-open https://github.com/notifications &

;; ─────────────────────────────────────────────────────────────
;; Notifications
;; ─────────────────────────────────────────────────────────────

[module/notifications]
type = custom/script
exec = ~/.config/eww/notif-count.sh
interval = 3
click-left = ~/.config/eww/toggle-notif.sh

;; ─────────────────────────────────────────────────────────────
;; Global Settings
;; ─────────────────────────────────────────────────────────────

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
