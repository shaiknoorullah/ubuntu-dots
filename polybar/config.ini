;; ─────────────────────────────────────────────────────────────
;; Polybar Config - Catppuccin Mocha
;; ─────────────────────────────────────────────────────────────

[colors]
base = #1E1E2E
surface0 = #313244
surface1 = #45475A
overlay0 = #6C7086
text = #CDD6F4
subtext0 = #A6ADC8
mauve = #CBA6F7
red = #F38BA8

;; ─────────────────────────────────────────────────────────────
;; Bar
;; ─────────────────────────────────────────────────────────────

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 32pt

background = ${colors.base}
foreground = ${colors.text}

line-size = 2pt

padding-left = 1
padding-right = 1

font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = i3
modules-center = date

cursor-click = pointer

enable-ipc = true

wm-restack = i3

;; ─────────────────────────────────────────────────────────────
;; Workspaces
;; ─────────────────────────────────────────────────────────────

[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent = true
index-sort = true

label-focused = %index%
label-focused-background = ${colors.surface0}
label-focused-foreground = ${colors.mauve}
label-focused-underline = ${colors.mauve}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.overlay0}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.subtext0}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}
label-urgent-padding = 2

;; ─────────────────────────────────────────────────────────────
;; Clock
;; ─────────────────────────────────────────────────────────────

[module/date]
type = internal/date
interval = 60

date =
date-alt = %a %d

time = %H:%M
time-alt = %H:%M

label = %date% %time%

;; ─────────────────────────────────────────────────────────────
;; Global Settings
;; ─────────────────────────────────────────────────────────────

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
