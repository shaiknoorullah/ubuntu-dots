# ─────────────────────────────────────────────────────────────
# Git Profile Configuration
# ─────────────────────────────────────────────────────────────
#
# This file is read by rofi-git-profile.sh, which presents the profiles
# below in a rofi menu. When a profile is selected, the script sets
# git's user.name and user.email (globally or per-repo, depending on
# invocation) to the chosen values.
#
# FORMAT:
#   name|user|email
#
#   - name    : A human-readable label shown in the rofi menu (e.g.,
#               "Work", "Personal", "OSS Contributor"). This is display
#               only and is not written to any git config.
#   - user    : The value written to git's user.name.
#   - email   : The value written to git's user.email.
#
# RULES:
#   - One profile per line.
#   - Fields are separated by the pipe character (|). Do NOT add spaces
#     around the pipes.
#   - Lines starting with # are comments and are ignored.
#   - Blank lines are ignored.
#
# HOW TO ADD A PROFILE:
#   Simply add a new line following the format above. For example:
#
#     Work|John Doe|john.doe@company.com
#     Personal|johndoe|john@personal.com
#     OSS|jdoe-oss|jdoe@opensource.org
#
#   After saving, the new profile will appear the next time the rofi
#   git-profile menu is launched.
# ─────────────────────────────────────────────────────────────
Personal|shaiknoorullah|shaiknooru247@gmail.com
Work|snoorullah|snoorullah@proficientnow.com